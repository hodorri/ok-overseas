    });
  };

  const removeDayItem = (agency, dayIdx, itemIdx) => {
    setItineraryData(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      copy[tab][agency].days[dayIdx].items.splice(itemIdx, 1);
      return copy;
    });
  };

  // 좌표 추가 (이름 직접 입력 + 지도 클릭으로 좌표 지정)
  const addCoordByMapClick = (agency, dayIdx) => {
    setMapClickTarget({ agency, dayIdx });
    setNewPlaceName('');
  };

  // 좌표 삭제
  const removeCoord = (agency, dayIdx, coordIdx) => {
    setItineraryData(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      copy[tab][agency].days[dayIdx].coords.splice(coordIdx, 1);
      return copy;
    });
  };

  // 지도 클릭으로 좌표 확정
  const handleMapClick = useCallback((e) => {
    if (!mapClickTarget) return;
    const lat = e.latLng.lat();
    const lng = e.latLng.lng();
    const name = newPlaceName.trim() || `포인트 (${lat.toFixed(3)}, ${lng.toFixed(3)})`;
    setItineraryData(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      copy[tab][mapClickTarget.agency].days[mapClickTarget.dayIdx].coords.push({ lat, lng, name });
      return copy;
    });
    setMapClickTarget(null);
    setNewPlaceName('');
  }, [mapClickTarget, newPlaceName, tab]);

  useEffect(() => {
    if (!window.google || !window.google.maps) return;
    const center = MAP_CENTERS[tab];
    if (!mapInstance.current) {
      mapInstance.current = new google.maps.Map(mapRef.current, {
        center: { lat: center.lat, lng: center.lng },
        zoom: center.zoom,
        styles: [{ featureType:'poi', stylers:[{visibility:'off'}] }],
      });
    } else {
      mapInstance.current.setCenter({ lat: center.lat, lng: center.lng });
      mapInstance.current.setZoom(center.zoom);
    }

    // 지도 클릭 이벤트 (편집 모드에서 좌표 추가)
    google.maps.event.clearListeners(mapInstance.current, 'click');
    mapInstance.current.addListener('click', handleMapClick);

    // Clear old markers
    markersRef.current.forEach(m => m.setMap(null));
    markersRef.current = [];
    agencyMarkersRef.current = {};

    // Add markers per agency
    const data = itineraryData[tab];
    AGENCIES.forEach(agency => {
      if (!visibleAgencies[agency]) return;
      const color = AGENCY_COLORS[agency];
      const itin = data[agency];
      let markerIndex = 1;
      const pathCoords = [];
      agencyMarkersRef.current[agency] = [];

      itin.days.forEach(day => {
        day.coords.forEach(c => {
          pathCoords.push({ lat: c.lat, lng: c.lng });
          const displayName = c.name && !c.name.startsWith('포인트') ? c.name : `${day.day} #${markerIndex}`;
          const marker = new google.maps.Marker({
            position: { lat: c.lat, lng: c.lng },
            map: mapInstance.current,
            label: { text: String(markerIndex), color: 'white', fontWeight: 'bold', fontSize: '11px' },
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              fillColor: color,
              fillOpacity: 1,
              strokeColor: '#fff',
              strokeWeight: 2,
              scale: 14,
            },
            title: `${agency} - ${displayName}`,
          });
          const infoWindow = new google.maps.InfoWindow({
            content: `<div style="font-size:13px;padding:4px;"><b style="color:${color}">${agency}</b><br/><span style="font-size:11px;color:#666;">${day.day}</span><br/><b>${displayName}</b></div>`
          });
          marker.addListener('click', () => infoWindow.open(mapInstance.current, marker));
          markersRef.current.push(marker);
          agencyMarkersRef.current[agency].push({ marker, infoWindow });
          markerIndex++;
        });
      });

      // Draw polyline
      if (pathCoords.length > 1) {
        const polyline = new google.maps.Polyline({
          path: pathCoords,
          geodesic: true,
          strokeColor: color,
          strokeOpacity: 0.7,
          strokeWeight: 3,
          map: mapInstance.current,
        });
        markersRef.current.push(polyline);
      }
    });
  }, [tab, visibleAgencies, itineraryData, handleMapClick]);

  const data = itineraryData[tab];

  return (
    <section id="tour" className="mb-16 scroll-mt-20">
      <SectionTitle>관광+일정 비교</SectionTitle>
      <TabBar tabs={REGIONS} active={tab} onChange={setTab} />

      {/* Agency toggles */}
      <div className="flex gap-3 mb-4">
        {AGENCIES.map(a => (
          <button key={a} onClick={() => toggleAgency(a)}
            className={`px-4 py-2 rounded-lg text-sm font-medium border-2 transition ${visibleAgencies[a] ? 'text-white' : 'bg-white'}`}
            style={visibleAgencies[a] ? { backgroundColor: AGENCY_COLORS[a], borderColor: AGENCY_COLORS[a] } : { borderColor: AGENCY_COLORS[a], color: AGENCY_COLORS[a] }}>
            {a}
          </button>
        ))}
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
        {/* Timeline */}
        <div className="space-y-4 max-h-[700px] overflow-y-auto pr-2">
          {AGENCIES.filter(a => visibleAgencies[a]).map(agency => {
            const days = data[agency].days;
            const hasBatches = days.some(d => d.batch);

            // Pre-compute global coord/item start indices per day (flat array order, matches map markers)
            const dayCoordStarts = [];
            const dayItemStarts = [];
            let cTotal = 0, iTotal = 0;
            days.forEach((day, i) => {
              dayCoordStarts[i] = cTotal;
              dayItemStarts[i] = iTotal;
              cTotal += (day.coords || []).length;
              iTotal += day.items.length;
            });

            // Group days by day key (preserves insertion order)
            const dayGroups = [];
            const dayGroupMap = {};
            days.forEach((day, idx) => {
              const key = day.day;
              if (!dayGroupMap[key]) {
                dayGroupMap[key] = [];
                dayGroups.push({ dayKey: key, entries: dayGroupMap[key] });
              }
              dayGroupMap[key].push({ ...day, _idx: idx });
            });

            // Render helper for a single day entry (items + edit coords)
            const renderDayEntry = (entry, di, agencyColor) => {
              const coordStart = dayCoordStarts[di];
              const coordEnd = coordStart + (entry.coords || []).length;
              const itemStart = dayItemStarts[di];
              return (
                <React.Fragment key={di}>
                  <ul className="text-xs text-gray-600 mt-1 space-y-0.5">
                    {entry.items.map((item, ii) => {
                      const currentIdx = itemStart + ii;
                      const coordIdx = coordStart + ii < coordEnd ? coordStart + ii : -1;
                      return (
                      <li key={ii} className="flex items-center gap-1">
                        <span className={`w-4 h-4 rounded-full flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0 ${coordIdx >= 0 ? 'cursor-pointer hover:scale-125 hover:ring-2 hover:ring-offset-1 transition-transform' : ''}`}
                          style={{ backgroundColor: agencyColor, ringColor: agencyColor }}
                          onMouseEnter={() => coordIdx >= 0 && highlightMarker(agency, coordIdx)}
                          onMouseLeave={() => coordIdx >= 0 && unhighlightMarker(agency, coordIdx)}>
                          {currentIdx + 1}
                        </span>
                        <EditableCell value={item} onSave={(val) => updateDayItem(agency, di, ii, val)} className="inline" />
                        {isEditMode && entry.items.length > 1 && (
                          <button onClick={() => removeDayItem(agency, di, ii)} className="text-red-400 hover:text-red-600 text-xs ml-1 flex-shrink-0">&times;</button>
                        )}
                      </li>
                      );
                    })}
                    {isEditMode && (
                      <li>
                        <button onClick={() => addDayItem(agency, di)} className="text-ok-orange text-xs hover:underline">+ 항목 추가</button>
                      </li>
                    )}
                  </ul>
                  {isEditMode && (
                    <div className="mt-2 p-2 bg-blue-50 rounded-lg border border-blue-100">
                      <div className="text-xs font-bold text-blue-600 mb-1">📍 동선 포인트 ({entry.coords.length}개)</div>
                      {entry.coords.map((c, ci) => (
                        <div key={ci} className="flex items-center gap-1 text-xs text-blue-800 py-0.5">
                          <span className="bg-blue-200 text-blue-900 w-4 h-4 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">{ci+1}</span>
                          <span className="flex-1">{c.name}</span>
                          <span className="text-blue-400 text-xs">{c.lat.toFixed(3)},{c.lng.toFixed(3)}</span>
                          <button onClick={() => removeCoord(agency, di, ci)} className="text-red-400 hover:text-red-600 font-bold flex-shrink-0">&times;</button>
                        </div>
                      ))}
                      {mapClickTarget?.agency === agency && mapClickTarget?.dayIdx === di ? (
                        <div className="mt-1 p-2 bg-green-50 border border-green-300 rounded">
                          <div className="text-xs text-green-700 font-bold mb-1">지도를 클릭하면 포인트가 추가됩니다</div>
                          <div className="flex gap-1">
                            <input className="flex-1 border border-green-300 rounded px-2 py-1 text-xs"
                              placeholder="장소명 (선택, 입력 후 지도 클릭)"
                              value={newPlaceName}
                              onChange={e => setNewPlaceName(e.target.value)}
                              autoFocus />
                            <button onClick={() => setMapClickTarget(null)}
                              className="bg-gray-400 text-white px-2 py-1 rounded text-xs font-bold hover:bg-gray-500">취소</button>
                          </div>
                        </div>
                      ) : (
                        <div className="mt-1 flex gap-1">
                          <button onClick={() => addCoordByMapClick(agency, di)}
                            className="bg-blue-500 text-white px-3 py-1 rounded text-xs font-bold hover:bg-blue-600 flex-1">
                            지도 클릭으로 추가
                          </button>
                          <button onClick={() => {
                            const input = window.prompt('좌표와 장소명 입력\n형식: 위도, 경도, 장소명\n예: 26.2187, 127.6937, 나하 호텔');
                            if (!input) return;
                            const parts = input.split(',').map(s => s.trim());
                            const lat = parseFloat(parts[0]);
                            const lng = parseFloat(parts[1]);
                            const name = parts.slice(2).join(',').trim() || ('포인트 (' + lat.toFixed(3) + ', ' + lng.toFixed(3) + ')');
                            if (isNaN(lat) || isNaN(lng)) { alert('좌표 형식이 올바르지 않습니다'); return; }
                            setItineraryData(prev => {
                              const copy = JSON.parse(JSON.stringify(prev));
                              copy[tab][agency].days[di].coords.push({ lat, lng, name });
                              return copy;
                            });
                          }}
                            className="bg-gray-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-gray-700 flex-1">
                            좌표 직접 입력
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </React.Fragment>
              );
            };

            const batchNames = hasBatches ? [...new Set(days.filter(d => d.batch).map(d => d.batch))] : [];

            return (
            <div key={agency} className="bg-white rounded-xl shadow p-5">
              <h3 className="font-bold text-lg mb-3" style={{ color: AGENCY_COLORS[agency] }}>{agency}</h3>
              {hasBatches ? (
                /* 차수 비교 테이블 레이아웃 (행=Day, 열=차수) */
                <div className="overflow-x-auto">
                  <table className="w-full text-sm border-collapse">
                    <thead>
                      <tr className="border-b-2" style={{ borderColor: AGENCY_COLORS[agency] }}>
                        <th className="text-left py-2 px-2 w-16 font-bold text-xs text-gray-500 uppercase">일차</th>
                        {batchNames.map((b, bi) => (
                          <th key={b} className="text-left py-2 px-3">
                            <span className={`text-xs px-2.5 py-1 rounded-full font-bold ${bi === 0 ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>
                              {b}
                            </span>
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {dayGroups.map((group, gi) => (
                        <tr key={gi} className="border-b border-gray-100 align-top">
                          <td className="py-3 px-2 font-bold text-sm whitespace-nowrap" style={{ color: AGENCY_COLORS[agency] }}>
                            <div className="flex items-center gap-2">
                              <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: AGENCY_COLORS[agency] }}></span>
                              {group.dayKey}
                            </div>
                          </td>
                          {batchNames.map((batchName) => {
                            const entry = group.entries.find(e => e.batch === batchName);
                            if (!entry) return <td key={batchName} className="py-3 px-3 text-gray-300 text-xs">-</td>;
                            return (
                              <td key={batchName} className="py-3 px-3">
                                <div className="font-medium text-sm text-gray-800 mb-1">
                                  <EditableCell value={entry.title} onSave={(val) => updateDayTitle(agency, entry._idx, val)} className="inline" />
                                </div>
                                {renderDayEntry(entry, entry._idx, AGENCY_COLORS[agency])}
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : (
                /* 차수 없는 기존 타임라인 레이아웃 */
                <div className="timeline-line pl-8 space-y-3">
                  {dayGroups.map((group, gi) => (
                    <div key={gi} className="flex gap-3 items-start">
                      <div className="timeline-dot mt-1" style={{ backgroundColor: AGENCY_COLORS[agency] }}></div>
                      <div className="flex-1">
                        <div className="font-bold text-sm" style={{ color: AGENCY_COLORS[agency] }}>
                          {group.dayKey} - <EditableCell value={group.entries[0].title} onSave={(val) => updateDayTitle(agency, group.entries[0]._idx, val)} className="inline" />
                        </div>
                        {renderDayEntry(group.entries[0], group.entries[0]._idx, AGENCY_COLORS[agency])}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            );
          })}
        </div>

        {/* Map */}
        <div className="bg-white rounded-xl shadow overflow-hidden relative" style={{ minHeight: '500px' }}>
          <div ref={mapRef} className="w-full h-full" style={{ minHeight: '500px', cursor: mapClickTarget ? 'crosshair' : '' }} />
          {mapClickTarget && (
            <div className="absolute top-3 left-1/2 -translate-x-1/2 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm font-bold z-10 animate-pulse">
              지도를 클릭하여 "{newPlaceName || '포인트'}" 위치를 지정하세요
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

// ============ ETC SECTION ============
function EtcSection({ onInternalScoresChange, internalEvalData, quoteData, safetySubmission, setSafetySubmission }) {
  const { isEditMode } = useEditMode();
  const loadNotes = () => {
    try {
      const s = localStorage.getItem('ok_eval_notes');
      if (s) return JSON.parse(s);
    } catch(e) {}
    return {};
  };
  const [notes, setNotes] = useState(loadNotes);

  useEffect(() => {
    localStorage.setItem('ok_eval_notes', JSON.stringify(notes));
  }, [notes]);

  const updateNote = (key, val) => setNotes(p => ({ ...p, [key]: val }));

  // 견적 시트의 수수료율 행에서 동적 추출
  const feeRates = React.useMemo(() => {
    const rates = { '하나투어': {}, '레드캡': {}, '롯데관광': {} };
    REGIONS.forEach(region => {
      const qd = quoteData?.[region];
      if (!qd) return;
      const feeRow = qd.rows.find(r => r[0] && r[0].includes('수수료'));
      if (!feeRow) return;
      qd.headers.forEach((h, i) => {
        if (i === 0) return;
        const val = feeRow[i] || '-';
        AGENCIES.forEach(a => {
          const shortName = a.replace('관광', '');
          if (h.includes(shortName) && !rates[a][region]) {
            rates[a][region] = val;
          }
        });
      });
    });
    return rates;
  }, [quoteData]);

  return (
    <section id="etc" className="mb-16 scroll-mt-20">
      <SectionTitle>기타 평가</SectionTitle>
      <div className="space-y-6">
        {/* Safety Manual */}
        <div className="bg-white rounded-xl shadow p-6">
          <h3 className="font-bold text-lg mb-4 flex items-center gap-2">
            <span className="w-2 h-6 bg-ok-orange rounded"></span>
            안전사고 매뉴얼 보유 평가
          </h3>
          <div className="text-xs text-gray-500 mb-4 bg-gray-50 rounded-lg p-3">
            제출 체크 시 평가결과 &gt; 안전사고 매뉴얼 점수에 자동 반영됩니다. (안전사고 매뉴얼 7.5점 + 병원 리스트 2.5점 = 10점 만점)
          </div>
          <div className="overflow-x-auto mb-4">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-gray-50">
                  <th className="p-3 text-left">항목</th>
                  <th className="p-3 text-center">배점</th>
                  {AGENCIES.map(a => <th key={a} className="p-3 text-center" style={{ color: AGENCY_COLORS[a] }}>{a}</th>)}
                </tr>
              </thead>
              <tbody>
                <tr className="border-t">
                  <td className="p-3 font-medium">안전사고 매뉴얼</td>
                  <td className="p-3 text-center text-ok-orange font-bold">7.5점</td>
                  {AGENCIES.map(a => (
                    <td key={a} className="p-3 text-center">
                      <label className="inline-flex items-center gap-2 cursor-pointer">
                        <input type="checkbox"
                          checked={safetySubmission[a]?.manual || false}
                          disabled={!isEditMode}
                          onChange={e => {
                            const newSafety = { ...safetySubmission, [a]: { ...safetySubmission[a], manual: e.target.checked } };
                            setSafetySubmission(newSafety);
                            saveToSheet('안전사고_매뉴얼', ['업체명', '안전사고 매뉴얼', '병원 리스트', '메모', '수수료 메모'],
                              AGENCIES.map(ag => [ag, newSafety[ag]?.manual ? '제출' : '미제출', newSafety[ag]?.hospital ? '제출' : '미제출', newSafety[ag]?.memo || '', newSafety[ag]?.feeMemo || '']));
                          }}
                          className="w-5 h-5 accent-ok-orange rounded" />
                        <span className={`text-sm font-bold ${safetySubmission[a]?.manual ? 'text-green-600' : 'text-gray-400'}`}>
                          {safetySubmission[a]?.manual ? '제출' : '미제출'}
                        </span>
                      </label>
                    </td>
                  ))}
                </tr>
                <tr className="border-t">
                  <td className="p-3 font-medium">병원 리스트</td>
                  <td className="p-3 text-center text-ok-orange font-bold">2.5점</td>
                  {AGENCIES.map(a => (
                    <td key={a} className="p-3 text-center">
                      <label className="inline-flex items-center gap-2 cursor-pointer">
                        <input type="checkbox"
                          checked={safetySubmission[a]?.hospital || false}
                          disabled={!isEditMode}
                          onChange={e => {
                            const newSafety = { ...safetySubmission, [a]: { ...safetySubmission[a], hospital: e.target.checked } };
                            setSafetySubmission(newSafety);
                            saveToSheet('안전사고_매뉴얼', ['업체명', '안전사고 매뉴얼', '병원 리스트', '메모', '수수료 메모'],
                              AGENCIES.map(ag => [ag, newSafety[ag]?.manual ? '제출' : '미제출', newSafety[ag]?.hospital ? '제출' : '미제출', newSafety[ag]?.memo || '', newSafety[ag]?.feeMemo || '']));
                          }}
                          className="w-5 h-5 accent-ok-orange rounded" />
                        <span className={`text-sm font-bold ${safetySubmission[a]?.hospital ? 'text-green-600' : 'text-gray-400'}`}>
                          {safetySubmission[a]?.hospital ? '제출' : '미제출'}
                        </span>
                      </label>
                    </td>
                  ))}
                </tr>
                <tr className="border-t-2 border-ok-orange bg-ok-light font-bold">
                  <td className="p-3">합계</td>
                  <td className="p-3 text-center text-ok-orange">10점</td>
                  {AGENCIES.map(a => {
                    const total = (safetySubmission[a]?.manual ? 7.5 : 0) + (safetySubmission[a]?.hospital ? 2.5 : 0);
                    return <td key={a} className="p-3 text-center text-lg" style={{ color: AGENCY_COLORS[a] }}>{total}점</td>;
                  })}
                </tr>
              </tbody>
            </table>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {AGENCIES.map(a => (
              <div key={a}>
                <label className="font-medium text-sm mb-1 block" style={{ color: AGENCY_COLORS[a] }}>{a} 메모</label>
                <textarea rows={2}
                  className="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-ok-orange focus:border-ok-orange outline-none disabled:bg-gray-50 disabled:text-gray-500"
                  placeholder={`${a} 안전사고 매뉴얼 관련 메모...`}
                  disabled={!isEditMode}
                  value={safetySubmission[a]?.memo || ''}
                  onChange={e => {
                    const newSafety = { ...safetySubmission, [a]: { ...safetySubmission[a], memo: e.target.value } };
                    setSafetySubmission(newSafety);
                  }}
                  onBlur={() => {
                    const ss = safetySubmission;
                    saveToSheet('안전사고_매뉴얼', ['업체명', '안전사고 매뉴얼', '병원 리스트', '메모', '수수료 메모'],
                      AGENCIES.map(ag => [ag, ss[ag]?.manual ? '제출' : '미제출', ss[ag]?.hospital ? '제출' : '미제출', ss[ag]?.memo || '', ss[ag]?.feeMemo || '']));
                  }} />
              </div>
            ))}
          </div>
        </div>

        {/* Fee */}
        <div className="bg-white rounded-xl shadow p-6">
          <h3 className="font-bold text-lg mb-4 flex items-center gap-2">
            <span className="w-2 h-6 bg-ok-orange rounded"></span>
            수수료 평가
          </h3>
          <div className="overflow-x-auto mb-4">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-gray-50">
                  <th className="p-3 text-left">지역</th>
                  {AGENCIES.map(a => <th key={a} className="p-3 text-center" style={{ color: AGENCY_COLORS[a] }}>{a}</th>)}
                </tr>
              </thead>
              <tbody>
                {REGIONS.map(r => (
                  <tr key={r} className="border-t">
                    <td className="p-3 font-medium">{r}</td>
                    {AGENCIES.map(a => (
                      <td key={a} className="p-3 text-center font-bold">{feeRates[a][r]}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {AGENCIES.map(a => (
              <div key={a}>
                <label className="font-medium text-sm mb-1 block" style={{ color: AGENCY_COLORS[a] }}>{a}</label>
                <textarea rows={3}
                  className="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-ok-orange focus:border-ok-orange outline-none disabled:bg-gray-50 disabled:text-gray-500"
                  placeholder={`${a} 수수료 관련 메모...`}
                  value={safetySubmission[a]?.feeMemo || ''}
                  onChange={e => {
                    const newSafety = { ...safetySubmission, [a]: { ...safetySubmission[a], feeMemo: e.target.value } };
                    setSafetySubmission(newSafety);
                  }}
                  onBlur={() => {
                    const ss = safetySubmission;
                    saveToSheet('안전사고_매뉴얼', ['업체명', '안전사고 매뉴얼', '병원 리스트', '메모', '수수료 메모'],
                      AGENCIES.map(ag => [ag, ss[ag]?.manual ? '제출' : '미제출', ss[ag]?.hospital ? '제출' : '미제출', ss[ag]?.memo || '', ss[ag]?.feeMemo || '']));
                  }}
                  disabled={!isEditMode} />
              </div>
            ))}
          </div>
        </div>

        {/* 내부 자체 평가 */}
        <InternalEvalSection evaluatorsFromSheet={internalEvalData} onScoresChange={onInternalScoresChange} />
      </div>
    </section>
  );
}

// ============ INTERNAL EVAL (대상자별) ============
const INTERNAL_CRITERIA = [
  { id: 'proposal', label: '제안의 적정성', weight: 10 },
  { id: 'operation', label: '운영능력의 신뢰성', weight: 10 },
  { id: 'acceptance', label: '요구의 수용성', weight: 30 },
  { id: 'cost', label: '견적의 합리성', weight: 50 },
];

function InternalEvalSection({ evaluatorsFromSheet, onScoresChange }) {
  const { isEditMode } = useEditMode();
  const [evaluators, setEvaluators] = useState(evaluatorsFromSheet || []);
  const [newName, setNewName] = useState('');
  const [saving, setSaving] = useState('');
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3kY_L90YU872LMrbLqaWmdVfTKr2Juz0pVRYs_qDmWMBZ5bEKuU9A1KJhp8f-ndaEmQ/exec';

  // 시트 데이터가 로딩되면 반영
  useEffect(() => {
    if (evaluatorsFromSheet && evaluatorsFromSheet.length > 0) {
      setEvaluators(evaluatorsFromSheet);
    }
  }, [evaluatorsFromSheet]);

  // 평가자 데이터 변경 시 상위 평가 결과에 평균 점수 전달
  useEffect(() => {
    if (onScoresChange && evaluators.length > 0) {
      const scoreMap = {};
      AGENCIES.forEach(a => { scoreMap[a] = getAvg(a); });
      onScoresChange(scoreMap);
    }
  }, [evaluators]);

  const getTotal = (ev, a) => {
    let t = 0;
    INTERNAL_CRITERIA.forEach(c => { t += (ev.scores[a + '_' + c.id] || 0) * c.weight / 100; });
    return Math.round(t * 100) / 100;
  };

  const getAvg = (a) => {
    if (!evaluators.length) return 0;
    let s = 0;
    evaluators.forEach(ev => { s += getTotal(ev, a); });
    return Math.round(s / evaluators.length * 100) / 100;
  };

  // 스프레드시트에 저장
  const saveToSheet = async (newEvaluators) => {
    setSaving('저장 중...');
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ evaluators: newEvaluators }),
      });
      setSaving('저장 완료!');
    } catch(e) {
      setSaving('저장 실패');
    }
    setTimeout(() => setSaving(''), 2000);
  };

  // 대상자 추가
  const addEvaluator = () => {
    console.log('addEvaluator called, newName:', newName);
    const name = newName.trim();
    if (!name) { console.log('empty name, return'); return; }
    if (evaluators.some(ev => ev.name === name)) { console.log('duplicate name'); alert('이미 존재하는 평가자입니다.'); return; }
    const newList = evaluators.concat([{ name: name, scores: {} }]);
    console.log('newList length:', newList.length);
    setEvaluators(newList);
    setNewName('');
    saveToSheet(newList);
  };

  // 대상자 삭제
  const removeEvaluator = (idx) => {
    if (!window.confirm(evaluators[idx].name + ' 평가자를 삭제하시겠습니까?')) return;
    const newList = evaluators.filter((_, i) => i !== idx);
    setEvaluators(newList);
    saveToSheet(newList);
  };

  // 점수 변경
  const setScore = (evalIdx, agency, criteriaId, score) => {
    const newList = evaluators.map((ev, i) => {
      if (i !== evalIdx) return ev;
      return { ...ev, scores: { ...ev.scores, [agency + '_' + criteriaId]: score } };
    });
    setEvaluators(newList);
    saveToSheet(newList);
  };

  return (
    <div className="bg-white rounded-xl shadow p-6">
      <div className="flex items-center justify-between mb-4">
        <h3 className="font-bold text-lg flex items-center gap-2">
          <span className="w-2 h-6 bg-ok-orange rounded"></span>
          내부 자체 평가
        </h3>
        {saving && (
          <span className={`text-xs px-3 py-1 rounded-full font-bold ${saving.includes('완료') ? 'bg-green-100 text-green-700' : saving.includes('실패') ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}`}>
            {saving}
          </span>
        )}
      </div>
      <div className="mb-4 p-3 bg-gray-50 rounded-lg">
        <div className="text-xs font-bold text-gray-500 mb-2">평가 기준 (총 100점)</div>
        <div className="flex flex-wrap gap-3">
          {INTERNAL_CRITERIA.map(c => (
            <div key={c.id} className="flex items-center gap-1">
              <span className="bg-ok-orange text-white text-xs px-2 py-0.5 rounded-full font-bold">{c.weight}%</span>
              <span className="text-sm">{c.label}</span>
            </div>
          ))}
        </div>
      </div>
      {evaluators.length > 0 && (
        <div className="mb-6 p-4 bg-gradient-to-r from-ok-light to-white rounded-xl border border-ok-orange/20">
          <div className="text-sm font-bold text-ok-dark mb-3">종합 평균 (평가자 {evaluators.length}명)</div>
          <div className="grid grid-cols-3 gap-4">
            {AGENCIES.map(a => (
              <div key={a} className="text-center">
                <div className="text-lg font-bold" style={{color:AGENCY_COLORS[a]}}>{a}</div>
                <div className="text-2xl font-bold" style={{color:AGENCY_COLORS[a]}}>{getAvg(a).toFixed(2)}<span className="text-sm text-gray-400">점</span></div>
              </div>
            ))}
          </div>
        </div>
      )}
      {/* 대상자 추가 */}
      {isEditMode && (
      <div className="flex gap-2 mb-4">
        <input className="flex-1 border rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-ok-orange"
          placeholder="평가 대상자 이름 입력" value={newName}
          onChange={e => setNewName(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') addEvaluator(); }} />
        <button onClick={addEvaluator}
          className="bg-ok-orange text-white px-6 py-2 rounded-lg text-sm font-bold hover:bg-ok-mid transition">
          + 대상자 추가
        </button>
      </div>
      )}
      {evaluators.length === 0 ? (
        <div className="text-center py-10 text-gray-400 text-sm border-2 border-dashed rounded-xl">
          평가 대상자를 추가하면 평가표가 생성됩니다
        </div>
      ) : (
        <div className="space-y-4">
          {evaluators.map((ev, ei) => (
            <div key={ei} className="border rounded-xl overflow-hidden">
              <div className="bg-gray-800 text-white px-4 py-2 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="bg-ok-orange w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">{ei+1}</span>
                  <span className="font-bold">{ev.name}</span>
                </div>
                <div className="flex items-center gap-3">
                  {AGENCIES.map(a => (
                    <span key={a} className="text-xs" style={{color:AGENCY_COLORS[a]}}>
                      {a}: <span className="font-bold">{getTotal(ev, a).toFixed(2)}</span>점
                    </span>
                  ))}
                  {isEditMode && <button onClick={() => removeEvaluator(ei)}
                    className="bg-red-500/80 hover:bg-red-600 text-white text-xs px-3 py-1 rounded ml-2 transition">삭제</button>}
                </div>
              </div>
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-50">
                  <th className="p-2 text-left text-xs">평가항목</th>
                  <th className="p-2 text-center text-xs w-16">비중</th>
                  {AGENCIES.map(a => <th key={a} className="p-2 text-center text-xs" style={{color:AGENCY_COLORS[a]}}>{a}</th>)}
                </tr></thead>
                <tbody>
                  {INTERNAL_CRITERIA.map(c => (
                    <tr key={c.id} className="border-t">
                      <td className="p-2 text-xs font-medium">{c.label}</td>
                      <td className="p-2 text-center text-xs text-ok-orange font-bold">{c.weight}%</td>
                      {AGENCIES.map(a => {
                        const score = ev.scores[a + '_' + c.id] || 0;
                        return (
                          <td key={a} className="p-2 text-center">
                            <div className="flex justify-center gap-0.5">
                              {[1,2,3,4,5].map(v => (
                                <button key={v} onClick={() => isEditMode && setScore(ei, a, c.id, v)}
                                  disabled={!isEditMode}
                                  className={`w-7 h-7 rounded-full text-xs font-bold transition ${isEditMode ? 'cursor-pointer hover:scale-110' : 'cursor-default'} ${score===v ? 'text-white shadow-md' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}
                                  style={score===v ? {backgroundColor:AGENCY_COLORS[a]} : {}}>
                                  {v}
                                </button>
                              ))}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
                <tfoot><tr className="border-t-2 bg-ok-light font-bold">
                  <td className="p-2 text-xs">가중 합산</td>
                  <td className="p-2 text-center text-xs">100%</td>
                  {AGENCIES.map(a => <td key={a} className="p-2 text-center text-sm" style={{color:AGENCY_COLORS[a]}}>{getTotal(ev, a).toFixed(2)}</td>)}
                </tr></tfoot>
              </table>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============ PDF EXPORT ============
async function exportPDF() {
  const { jsPDF } = window.jspdf;

  const editToolbar = document.querySelector('.edit-toolbar');
  if (editToolbar) editToolbar.style.display = 'none';

  const loading = document.createElement('div');
  loading.innerHTML = '<div style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:bold;">PDF 생성 중... 잠시만 기다려주세요</div>';
  document.body.appendChild(loading);

  const wait = (ms) => new Promise(r => setTimeout(r, ms));

  // 섹션의 탭 버튼 클릭 후 렌더링 대기
  async function clickTab(section, tabName) {
    const buttons = section.querySelectorAll('.tab-btn');
    for (const btn of buttons) {
      if (btn.textContent.trim() === tabName) {
        btn.click();
        await wait(300);
        return;
      }
    }
  }

  async function captureSection(section) {
    return html2canvas(section, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      scrollY: -window.scrollY,
      backgroundColor: '#f3f4f6',
    });
  }

  try {
    const pdf = new jsPDF('l', 'mm', 'a4');
    const pageW = 297;
    const pageH = 210;
    const margin = 6;
    const contentW = pageW - margin * 2;
    const contentH = pageH - margin * 2;
    let isFirstPage = true;

    function addCanvasToPdf(canvas) {
      const imgData = canvas.toDataURL('image/jpeg', 0.9);
      const imgW = contentW;
      const imgH = (canvas.height * contentW) / canvas.width;

      if (!isFirstPage) pdf.addPage();
      isFirstPage = false;

      if (imgH <= contentH) {
        pdf.addImage(imgData, 'JPEG', margin, margin, imgW, imgH);
      } else {
        let heightLeft = imgH;
        let position = 0;
        pdf.addImage(imgData, 'JPEG', margin, margin, imgW, imgH);
        heightLeft -= contentH;
        while (heightLeft > 0) {
          position = -(imgH - heightLeft);
          pdf.addPage();
          pdf.addImage(imgData, 'JPEG', margin, margin + position, imgW, imgH);
          heightLeft -= contentH;
        }
      }
    }

    // 탭 없는 섹션
    for (const id of ['overview', 'evaluation', 'etc']) {
      const section = document.getElementById(id);
      if (section) addCanvasToPdf(await captureSection(section));
    }

    // 탭 있는 섹션: 3개 지역 모두 캡처
    const regions = ['발리', '오키나와', '나고야'];
    for (const id of ['quote', 'flight', 'hotel', 'tour']) {
      const section = document.getElementById(id);
      if (!section) continue;
      for (const region of regions) {
        await clickTab(section, region);
        addCanvasToPdf(await captureSection(section));
      }
    }

    pdf.save('OK금융그룹_해외연수_업체평가_' + new Date().toISOString().slice(0,10) + '.pdf');
  } catch(err) {
    alert('PDF 생성 실패: ' + err.message);
  }

  document.body.removeChild(loading);
  if (editToolbar) editToolbar.style.display = '';
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
