const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ============ EDIT CONTEXT ============
const EditContext = createContext({ isEditMode: false });

function useEditMode() {
  return useContext(EditContext);
}

// ============ EDITABLE CELL COMPONENT ============
function EditableCell({ value, onSave, tag: Tag = 'span', className = '', inputClassName = '', multiline = false, style = {} }) {
  const { isEditMode } = useEditMode();
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const inputRef = useRef(null);

  useEffect(() => { setDraft(value); }, [value]);
  useEffect(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      if (inputRef.current.select) inputRef.current.select();
    }
  }, [editing]);

  if (!isEditMode) {
    return <Tag className={className} style={style}>{value}</Tag>;
  }

  if (editing) {
    const handleDone = () => {
      setEditing(false);
      if (draft !== value) onSave(draft);
    };
    if (multiline) {
      return <textarea ref={inputRef} className={`editable-input ${inputClassName}`} style={style}
        value={draft} onChange={e => setDraft(e.target.value)}
        onBlur={handleDone} onKeyDown={e => { if (e.key==='Escape') { setDraft(value); setEditing(false); }}} rows={3} />;
    }
    return <input ref={inputRef} className={`editable-input ${inputClassName}`} style={style}
      value={draft} onChange={e => setDraft(e.target.value)}
      onBlur={handleDone} onKeyDown={e => { if (e.key==='Enter') handleDone(); if (e.key==='Escape') { setDraft(value); setEditing(false); }}} />;
  }

  return (
    <Tag className={`editable-cell ${className}`} style={{...style, display: Tag==='span' ? 'inline-block' : undefined, minWidth: '20px', padding: '2px 4px'}}
      onClick={() => setEditing(true)}>
      {value || '\u00A0'}
    </Tag>
  );
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cells = [];
    let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && i + 1 < line.length && line[i + 1] === '"') { current += '"'; i++; }
        else { inQuotes = !inQuotes; }
      } else if (ch === ',' && !inQuotes) { cells.push(current); current = ''; }
      else { current += ch; }
    }
    cells.push(current);
    return cells;
  });
}

async function fetchSheetData(sheetName) {
  const gid = SHEET_GID[sheetName];
  if (gid !== undefined) {
    // 직접 CSV export (gviz 아포스트로피 파싱 문제 회피)
    try {
      const url = `https://docs.google.com/spreadsheets/d/${GSHEET_ID}/export?format=csv&gid=${gid}&_t=${Date.now()}`;
      const res = await fetch(url, { cache: 'no-store' });
      if (res.ok) {
        const text = await res.text();
        const parsed = parseCSV(text);
        if (parsed && parsed.length > 0) return parsed;
      }
    } catch(e) {}
  }
  // 폴백: gviz CSV
  try {
    const url = `https://docs.google.com/spreadsheets/d/${GSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&_t=${Date.now()}`;
    const res = await fetch(url, { cache: 'no-store' });
    if (res.ok) {
      const text = await res.text();
      return parseCSV(text);
    }
  } catch(e) {}
  return null;
}

// ============ GOOGLE MAPS 링크 ↔ 좌표 변환 ============
function coordToMapsUrl(lat, lng) {
  return `https://www.google.com/maps?q=${lat},${lng}`;
}

function mapsUrlToCoord(url) {
  if (!url) return null;
  // https://www.google.com/maps?q=lat,lng
  let m = url.match(/[?&]q=([-\d.]+),([-\d.]+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  // https://www.google.com/maps/@lat,lng or /place/lat,lng
  m = url.match(/[@/]([-\d.]+),([-\d.]+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  // 숫자만 있는 경우 (기존 호환: lat,lng 또는 lat)
  m = url.match(/^([-\d.]+),([-\d.]+)$/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  return null;
}

// ============ GOOGLE SHEETS 쓰기 (양방향 동기화) ============
async function saveToSheet(sheetName, headers, rows) {
  try {
    const res = await fetch('/api/sheets-save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveSheet', sheetName, headers, rows }),
    });

  } catch(e) {
    console.warn(`시트 저장 오류: ${sheetName}`, e);
    return { success: false, error: e.message };
  }
}

// 데이터를 시트 형식으로 변환하는 헬퍼들
function quoteDataToSheetFormat(quoteData) {
  const sheets = [];
  const regionSheetMap = { '발리': '견적_발리', '오키나와': '견적_오키나와', '나고야': '견적_나고야' };
  for (const [region, data] of Object.entries(quoteData)) {
    if (regionSheetMap[region]) {
      sheets.push({ sheetName: regionSheetMap[region], headers: data.headers, rows: data.rows });
    }
  }
  return sheets;
}

function flightDataToSheetFormat(flightData) {
  // 항공 시트: 지역 | 항목 | 업체1 | 업체2 | ...
  const allRows = [];
  let headers = null;
  for (const [region, data] of Object.entries(flightData)) {
    if (!headers) headers = ['지역', '항목', ...data.headers.slice(1)];
    data.rows.forEach(row => {
      allRows.push([region, row[0], ...row.slice(1)]);
    });
  }
  return [{ sheetName: '항공', headers: headers || ['지역','항목'], rows: allRows }];
}

function overviewDataToSheetFormat(overviewData) {
  return [{ sheetName: '입찰개요', headers: ['항목', '내용'], rows: overviewData }];
}

function hotelDataToSheetFormat(hotelData) {
  const rows = [];
  for (const [region, agencies] of Object.entries(hotelData)) {
    for (const ag of agencies) {
      for (const opt of ag.options) {
        rows.push([
          region, ag.agency, opt.plan || '', opt.name, String(opt.stars || 3),
          opt.details || '', (opt.amenities || []).join('|'),
          opt.price || '', opt.planTotal || '', opt.color || '#3B82F6'
        ]);
      }
    }
  }
  return [{ sheetName: '호텔', headers: ['지역','업체','안','호텔명','별점','상세','부대시설','가격','합계','색상'], rows }];
}

function itineraryDataToSheetFormat(itineraryData) {
  const sheets = [];
  const regionSheetMap = { '발리': '일정_발리', '오키나와': '일정_오키나와', '나고야': '일정_나고야' };
  for (const [region, agencies] of Object.entries(itineraryData)) {
    if (!regionSheetMap[region]) continue;
    const rows = [];
    for (const [agency, data] of Object.entries(agencies)) {
      for (const day of (data.days || [])) {
        const coordsStr = (day.coords || []).map(c => `${c.name}>${coordToMapsUrl(c.lat, c.lng)}`).join('|');
        rows.push([agency, day.batch || '', day.day, day.title, (day.items || []).join('|'), coordsStr]);
      }
    }
    sheets.push({ sheetName: regionSheetMap[region], headers: ['업체','차수','Day','제목','일정항목','좌표'], rows });
  }
  return sheets;
}

    rows.push([a.name, 'company', d.company || '']);
    rows.push([a.name, 'ceo', d.ceo || '']);
    rows.push([a.name, 'founded', d.founded || '']);
    rows.push([a.name, 'listed', d.listed || '']);
    rows.push([a.name, 'revenue', d.revenue || '']);
    rows.push([a.name, 'assets', d.assets || '']);
    rows.push([a.name, 'business', d.business || '']);
    rows.push([a.name, 'strengths', (d.strengths || []).join('|')]);
    rows.push([a.name, 'concept', d.concept || '']);
    rows.push([a.name, 'team_structure', (t.structure || []).join('|')]);
    rows.push([a.name, 'pm_name', pm.name || '']);
    rows.push([a.name, 'pm_title', pm.title || '']);
    rows.push([a.name, 'pm_exp', pm.exp || '']);
    rows.push([a.name, 'pm_dept', pm.dept || '']);
    for (const m of (t.members || [])) {
      rows.push([a.name, 'member', [m.name, m.title, m.exp, m.role].join('|')]);
    }
    for (const tr of (d.track || [])) {
      rows.push([a.name, 'track', [tr.client, tr.pax, tr.dest, tr.year, tr.amount].join('|')]);
    }
    rows.push([a.name, 'insurance', d.insurance || '']);
    rows.push([a.name, 'emergency', d.emergency || '']);
    rows.push([a.name, 'extras', (d.extras || []).join('|')]);
  }
  return [{ sheetName: '업체정보', headers: ['업체명','필드명','값'], rows }];
}

function getHotelImages(region, agency, hotelName) {
  const agencyMap = HOTEL_IMAGES[region]?.[agency];
  if (!agencyMap) return [];
  if (agencyMap[hotelName]) return agencyMap[hotelName];
  for (const [key, imgs] of Object.entries(agencyMap)) {
    if (hotelName.includes(key.substring(0, 6)) || key.includes(hotelName.substring(0, 6))) return imgs;
  }
  return Object.values(agencyMap)[0] || [];
}

// ============ DATA LOAD/SAVE HELPERS ============
function loadData(key, fallback) {
  try {
    const s = localStorage.getItem(key);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return JSON.parse(JSON.stringify(fallback));
}

function saveData(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

// ============ PPTX EXPORT ============
function exportPPTX(quoteData, flightData, hotelData, itineraryData, overviewData, agencyCards, evalState, notes) {
  const pptx = new PptxGenJS();
  pptx.defineLayout({ name:'CUSTOM', width:13.33, height:7.5 });
  pptx.layout = 'CUSTOM';

  const OK_ORANGE = 'F26522';
  const DARK = '333333';
  const WHITE = 'FFFFFF';
  const LIGHT_ORANGE = 'FFF3EC';
  const fontFace = 'Malgun Gothic';

  function addHeaderBar(slide, title) {
    slide.addShape(pptx.ShapeType.rect, { x:0, y:0, w:'100%', h:0.06, fill:{ color: OK_ORANGE } });
    slide.addText(title, { x:0.6, y:0.3, w:12, h:0.6, fontSize:24, fontFace, color:DARK, bold:true });
    slide.addShape(pptx.ShapeType.rect, { x:0.6, y:0.95, w:2, h:0.04, fill:{ color: OK_ORANGE } });
  }

  // Slide 1: Cover
  const s1 = pptx.addSlide();
  s1.addShape(pptx.ShapeType.rect, { x:0, y:0, w:'100%', h:'100%', fill:{ color: WHITE } });
  s1.addShape(pptx.ShapeType.rect, { x:0, y:0, w:0.15, h:'100%', fill:{ color: OK_ORANGE } });
  s1.addShape(pptx.ShapeType.rect, { x:0, y:3.0, w:'100%', h:0.06, fill:{ color: OK_ORANGE } });
  s1.addText('2026년 OK금융그룹\n해외연수 프로그램\n운영 업체 평가 보고서', { x:1.0, y:1.0, w:11, h:2.0, fontSize:32, fontFace, color:DARK, bold:true, lineSpacing:42 });
  s1.addText(new Date().toLocaleDateString('ko-KR') + ' | 인재개발팀', { x:1.0, y:3.4, w:11, h:0.5, fontSize:14, fontFace, color:'888888' });

  // Slide 2: Overview
  const s2 = pptx.addSlide();
  addHeaderBar(s2, '입찰 개요');
  const overviewRows = [[ { text:'항목', options:{ bold:true, color:WHITE, fill:{ color: OK_ORANGE } } }, { text:'내용', options:{ bold:true, color:WHITE, fill:{ color: OK_ORANGE } } } ]];
  overviewData.forEach(([k,v]) => {
    overviewRows.push([{ text:k, options:{ bold:true, color:DARK } }, { text: v.replace(/\n/g,' / '), options:{ color:DARK } }]);
  });
  s2.addTable(overviewRows, { x:0.6, y:1.3, w:12, fontSize:11, fontFace, border:{ pt:0.5, color:'CCCCCC' }, colW:[2.5,9.5], rowH:0.45 });

  // Slide 3: Evaluation
  const s3 = pptx.addSlide();
  addHeaderBar(s3, '평가 결과');
  const weights = evalState?.weights || Object.fromEntries(CRITERIA.map(c=>[c.id,c.defaultWeight]));
  const scores = evalState?.scores || {};
  const computeTotal = (agency) => {
    let sum = 0;
    CRITERIA.forEach(c => { sum += (scores[`${agency}_${c.id}`] || 3) * (weights[c.id] || 0) / 100; });
    return Math.round(sum * 100) / 100;
  };
  const evalRows = [[ { text:'평가항목', options:{bold:true,color:WHITE,fill:{color:OK_ORANGE}} }, { text:'가중치(%)', options:{bold:true,color:WHITE,fill:{color:OK_ORANGE}} },
    ...AGENCIES.map(a => ({ text:a, options:{bold:true,color:WHITE,fill:{color:OK_ORANGE}} })) ]];
  CRITERIA.forEach(c => {
    evalRows.push([ { text:c.label, options:{bold:true} }, { text:String(weights[c.id]||c.defaultWeight), options:{align:'center'} },
      ...AGENCIES.map(a => ({ text:String(scores[`${a}_${c.id}`]||3), options:{align:'center'} })) ]);
  });
  const totals = AGENCIES.map(a=>({agency:a,total:computeTotal(a)}));
  totals.sort((a,b)=>b.total-a.total);
  evalRows.push([ { text:'종합점수', options:{bold:true, fill:{color:LIGHT_ORANGE}} }, { text:'', options:{fill:{color:LIGHT_ORANGE}} },
    ...AGENCIES.map(a => ({ text:computeTotal(a).toFixed(2) + '점', options:{bold:true, align:'center', fill:{color:LIGHT_ORANGE}} })) ]);
  s3.addTable(evalRows, { x:0.6, y:1.3, w:12, fontSize:11, fontFace, border:{pt:0.5,color:'CCCCCC'}, colW:[2.5,1.5,2.67,2.67,2.67], rowH:0.42 });
  s3.addText(`종합 1위: ${totals[0].agency} (${totals[0].total.toFixed(2)}점)`, { x:0.6, y:5.5, w:12, h:0.5, fontSize:16, fontFace, color:OK_ORANGE, bold:true });

  // Slides 4-6: Quote comparison
  REGIONS.forEach(region => {
    const s = pptx.addSlide();
    addHeaderBar(s, `견적 비교 - ${region}`);
    const qd = quoteData[region];
    const qRows = [qd.headers.map(h => ({ text:h, options:{bold:true, color:WHITE, fill:{color:OK_ORANGE}, fontSize:9} }))];
    qd.rows.forEach((row, ri) => {
      qRows.push(row.map((cell, ci) => ({
        text: ci > 0 && ri < 7 && cell !== '-' && !cell.includes('%') ? cell + '원' : cell,
        options: { fontSize:9, align: ci===0?'left':'center', bold: ci===0||ri===0 }
      })));
    });
    const colCount = qd.headers.length;
    const availW = 12;
    const colW = qd.headers.map((_,i) => i===0 ? 1.8 : (availW-1.8)/(colCount-1));
    s.addTable(qRows, { x:0.6, y:1.3, w:12, fontSize:10, fontFace, border:{pt:0.5,color:'CCCCCC'}, colW, rowH:0.38 });
  });

  // Slides 7-9: Flight comparison
  REGIONS.forEach(region => {
    const s = pptx.addSlide();
    addHeaderBar(s, `항공 비교 - ${region}`);
    const fd = flightData[region];
    const fRows = [fd.headers.map(h => ({ text:h, options:{bold:true, color:WHITE, fill:{color:OK_ORANGE}} }))];
    fd.rows.forEach(row => {
      fRows.push(row.map((cell, ci) => ({ text:cell, options:{ align:ci===0?'left':'center', bold:ci===0 } })));
    });
    const colCount = fd.headers.length;
    const colW = fd.headers.map((_,i) => i===0 ? 1.8 : (12-1.8)/(colCount-1));
    s.addTable(fRows, { x:0.6, y:1.3, w:12, fontSize:11, fontFace, border:{pt:0.5,color:'CCCCCC'}, colW, rowH:0.42 });
  });

  // Slides 10-12: Hotel comparison
  REGIONS.forEach(region => {
    const s = pptx.addSlide();
    addHeaderBar(s, `호텔 비교 - ${region}`);
    let yPos = 1.3;
    hotelData[region].forEach(group => {
      s.addText(group.agency, { x:0.6, y:yPos, w:12, h:0.35, fontSize:14, fontFace, color: AGENCY_COLORS[group.agency]?.replace('#','') || DARK, bold:true });
      yPos += 0.35;
      group.options.forEach(h => {
        const info = `${h.name}  (${'★'.repeat(h.stars)})\n${h.details} | ${h.amenities.join(', ')} | ${h.price}`;
        s.addText(info, { x:0.8, y:yPos, w:11.5, h:0.55, fontSize:10, fontFace, color:DARK, lineSpacing:14 });
        yPos += 0.55;
      });
      yPos += 0.1;
    });
  });

  // Slides 13-15: Tour/Itinerary
  REGIONS.forEach(region => {
    const s = pptx.addSlide();
    addHeaderBar(s, `관광+일정 비교 - ${region}`);
    let yPos = 1.3;
    AGENCIES.forEach(agency => {
      const itin = itineraryData[region]?.[agency];
      if (!itin) return;
      s.addText(agency, { x:0.6, y:yPos, w:12, h:0.35, fontSize:13, fontFace, color: AGENCY_COLORS[agency]?.replace('#','') || DARK, bold:true });
      yPos += 0.35;
      itin.days.forEach(day => {
        const items = day.items.join(' > ');
        s.addText(`${day.day} ${day.title}: ${items}`, { x:0.8, y:yPos, w:11.5, h:0.3, fontSize:9, fontFace, color:DARK });
        yPos += 0.28;
      });
      yPos += 0.15;
    });
  });

  // Slide 16: Etc
  const s16 = pptx.addSlide();
  addHeaderBar(s16, '기타 평가');
  const feeRates = {
    '하나투어': { '발리': '4.57%', '오키나와': '4.63%', '나고야': '4.68%' },
    '레드캡': { '발리': '9.00%', '오키나와': '2.50%', '나고야': '6.00%' },
    '롯데관광': { '발리': '7.90%', '오키나와': '8.99%', '나고야': '4.39%' },
  };
  const feeRows = [[ { text:'지역', options:{bold:true,color:WHITE,fill:{color:OK_ORANGE}} }, ...AGENCIES.map(a=>({ text:a, options:{bold:true,color:WHITE,fill:{color:OK_ORANGE}} })) ]];
  REGIONS.forEach(r => {
    feeRows.push([ { text:r, options:{bold:true} }, ...AGENCIES.map(a=>({ text:feeRates[a][r], options:{align:'center'} })) ]);
  });
  s16.addTable(feeRows, { x:0.6, y:1.3, w:8, fontSize:11, fontFace, border:{pt:0.5,color:'CCCCCC'}, colW:[2,2,2,2], rowH:0.4 });

  let noteY = 3.2;
  if (notes) {
    const noteTexts = [];
    AGENCIES.forEach(a => {
      if (notes[`safety_${a}`]) noteTexts.push(`[안전] ${a}: ${notes[`safety_${a}`]}`);
      if (notes[`fee_${a}`]) noteTexts.push(`[수수료] ${a}: ${notes[`fee_${a}`]}`);
      if (notes[`internal_${a}`]) noteTexts.push(`[내부평가] ${a}: ${notes[`internal_${a}`]}`);
    });
    if (noteTexts.length > 0) {
      s16.addText('평가 메모', { x:0.6, y:noteY, w:12, h:0.35, fontSize:13, fontFace, color:DARK, bold:true });
      noteY += 0.4;
      s16.addText(noteTexts.join('\n'), { x:0.6, y:noteY, w:12, h:3.0, fontSize:9, fontFace, color:DARK, valign:'top', lineSpacing:14 });
    }
  }

  pptx.writeFile({ fileName: '2026_OK금융그룹_해외연수_평가보고서.pptx' });
}

function TabBar({ tabs, active, onChange }) {

        <button key={t} onClick={() => onChange(t)}
          className={`tab-btn px-4 py-2 text-sm font-medium rounded-t-lg border border-b-0 ${active===t ? 'active' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>

function ImageLightbox({ images, initialIndex, hotelName, onClose }) {
  const [idx, setIdx] = useState(initialIndex || 0);
  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setIdx(p => (p + 1) % images.length);
      if (e.key === 'ArrowLeft') setIdx(p => (p - 1 + images.length) % images.length);
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [images.length, onClose]);

  if (!images || images.length === 0) return null;
  return (
    <div className="lightbox-overlay" onClick={onClose}>
      <div className="lightbox-content" onClick={e => e.stopPropagation()}>
        <div className="text-white text-center mb-3">
          <span className="font-bold text-lg">{hotelName}</span>
          <span className="text-white/60 text-sm ml-3">{idx + 1} / {images.length}</span>
        </div>
        <div className="relative flex items-center justify-center" style={{minHeight:'400px'}}>
          {images.length > 1 && (
            <div className="lightbox-nav" style={{left:'-56px'}} onClick={() => setIdx(p => (p - 1 + images.length) % images.length)}>&#8249;</div>
          )}
          <img src={images[idx]} alt={hotelName} className="lightbox-img" onError={e => { e.target.style.display='none'; }} />
          {images.length > 1 && (
            <div className="lightbox-nav" style={{right:'-56px'}} onClick={() => setIdx(p => (p + 1) % images.length)}>&#8250;</div>
          )}
        </div>
        {images.length > 1 && (
          <div className="flex gap-2 mt-3 justify-center flex-wrap" style={{maxWidth:'700px',margin:'12px auto 0'}}>
            {images.map((img, i) => (
              <img key={i} src={img} alt="" className={`lightbox-thumb ${i === idx ? 'active' : ''}`}
                onClick={() => setIdx(i)} onError={e => { e.target.style.display='none'; }} />
            ))}
          </div>
        )}
        <button onClick={onClose} className="absolute top-0 right-0 text-white text-3xl w-12 h-12 flex items-center justify-center hover:text-ok-orange transition" style={{position:'absolute',top:'-8px',right:'-48px'}}>&times;</button>
      </div>
    </div>
  );
}

  const [internalEvalData, setInternalEvalData] = useState([]);
  const [scoreDefData, setScoreDefData] = useState([]);
  const [safetySubmission, setSafetySubmission] = useState({
    '하나투어': { manual: false, hospital: false },
    '레드캡': { manual: false, hospital: false },
    '롯데관광': { manual: false, hospital: false },
  });

  // Google Sheets에서 데이터 로딩 (시트 값이 있으면 하드코딩 대체)
  const [sheetLoaded, setSheetLoaded] = useState(false);
  useEffect(() => {
    async function loadFromSheets() {
      try {
        const [bali, oki, nagoya, flight, evalSheet, internalSheet,
               overviewSheet, agencySheet, hotelSheet, hotelImgSheet, hotelLocSheet,
               itiBali, itiOki, itiNagoya, safetySheet, scoreDefSheet] = await Promise.all([
          fetchSheetData('견적_발리'),
          fetchSheetData('견적_오키나와'),
          fetchSheetData('견적_나고야'),
          fetchSheetData('항공'),
          fetchSheetData('평가결과'),
          fetchSheetData('내부평가'),
          fetchSheetData('입찰개요'),
          fetchSheetData('업체정보'),
          fetchSheetData('호텔'),
          fetchSheetData('호텔_이미지'),
          fetchSheetData('호텔_위치'),
          fetchSheetData('일정_발리'),
          fetchSheetData('일정_오키나와'),
          fetchSheetData('일정_나고야'),
          fetchSheetData('안전사고_매뉴얼'),
          fetchSheetData('평가점수정의'),
        ]);

        // ── 견적 데이터 ──
        if (bali && bali.length > 1) {
          setQuoteData(prev => ({ ...prev, '발리': { headers: bali[0], rows: bali.slice(1) } }));
        }
        if (oki && oki.length > 1) {
          setQuoteData(prev => ({ ...prev, '오키나와': { headers: oki[0], rows: oki.slice(1) } }));
        }
        if (nagoya && nagoya.length > 1) {
          setQuoteData(prev => ({ ...prev, '나고야': { headers: nagoya[0], rows: nagoya.slice(1) } }));
        }

        // ── 항공 데이터 (지역별 분리) ──
        if (flight && flight.length > 1) {
          const regions = ['발리', '오키나와', '나고야'];
          const newFlightData = {};
          regions.forEach(region => {
            const regionRows = flight.filter(r => r[0] === region);
            if (regionRows.length > 0) {
              const headers = ['', ...flight[0].slice(2)];
              const rows = regionRows.map(r => [r[1], ...r.slice(2)]);
              newFlightData[region] = { headers, rows };
            }
          });
          if (Object.keys(newFlightData).length > 0) {
            setFlightData(prev => ({ ...prev, ...newFlightData }));
          }
        }

        // ── 평가결과 (시트 → 가중치 + 점수) ──
        if (evalSheet && evalSheet.length > 1) {
          const criteriaMap = { '항공':'flight', '호텔':'hotel', '관광+차량':'tour', '안전사고 매뉴얼':'safety', '수수료':'fee', '내부평가':'internal' };
          const newWeights = {};
          const newScores = {};
          evalSheet.slice(1).forEach(row => {
            const cid = criteriaMap[row[0]];
            if (!cid) return;
            newWeights[cid] = parseInt(row[1]) || 0;
            const agencies = ['하나투어', '레드캡', '롯데관광'];
            agencies.forEach((a, i) => {
              newScores[a + '_' + cid] = parseInt(row[i + 2]) || 3;
            });
          });
          localStorage.setItem('ok_eval_state', JSON.stringify({ weights: newWeights, scores: newScores }));
        }

        // ── 내부평가 ──
        if (internalSheet && internalSheet.length > 1) {
          const evaluators = {};
          internalSheet.slice(1).forEach(row => {
            const name = row[0];
            const agency = row[1];
            if (!name || !agency) return;
            if (!evaluators[name]) evaluators[name] = { name, scores: {} };
            evaluators[name].scores[agency + '_proposal'] = parseInt(row[2]) || 0;
            evaluators[name].scores[agency + '_operation'] = parseInt(row[3]) || 0;
            evaluators[name].scores[agency + '_acceptance'] = parseInt(row[4]) || 0;
            evaluators[name].scores[agency + '_cost'] = parseInt(row[5]) || 0;
          });
          setInternalEvalData(Object.values(evaluators));
        }

        // ── 안전사고 매뉴얼 제출현황 ──
        // 시트 구조: 업체명 | 안전사고 매뉴얼 | 병원 리스트 | 메모 | 수수료 메모
        if (safetySheet && safetySheet.length > 1) {
          const newSafety = {};
          safetySheet.slice(1).forEach(row => {
            const agency = (row[0] || '').trim();
            if (!agency) return;
            newSafety[agency] = {
              manual: (row[1] || '').trim() === '제출',
              hospital: (row[2] || '').trim() === '제출',
              memo: (row[3] || '').trim(),
              feeMemo: (row[4] || '').trim(),
            };
          });
          if (Object.keys(newSafety).length > 0) setSafetySubmission(prev => ({ ...prev, ...newSafety }));
        }

        // ── 입찰개요 ──
        // 시트 구조: 항목 | 내용
        if (overviewSheet && overviewSheet.length > 1) {
          const newOverview = overviewSheet.slice(1).map(row => [row[0] || '', row[1] || '']);
          if (newOverview.length > 0) setOverviewData(newOverview);
        }

        // ── 업체정보 ──
        // 시트 구조: 업체명 | 필드명 | 값
        // 필드명: sub, desc, color, company, ceo, founded, listed, revenue, assets, business,
        //         strengths (쉼표구분), concept, team_structure (쉼표구분),
        //         pm_name, pm_title, pm_exp, pm_dept,
        //         member_name, member_title, member_exp, member_role (멤버별 행 반복),
        //         track_client, track_pax, track_dest, track_year, track_amount (실적별 행 반복),
        //         insurance, emergency, extras (쉼표구분)
        if (agencySheet && agencySheet.length > 1) {
          const agencyMap = {};
          agencySheet.slice(1).forEach(row => {
            const agencyName = (row[0] || '').trim();
            const field = (row[1] || '').trim();
            const value = (row[2] || '').trim();
            if (!agencyName || !field) return;
            if (!agencyMap[agencyName]) {
              agencyMap[agencyName] = {
                name: agencyName, sub: '', desc: '', color: '#3B82F6',
                detail: {
                  company: '', ceo: '', founded: '', listed: '',
                  revenue: '', assets: '', business: '',
                  strengths: [], concept: '',
                  team: { structure: [], pm: { name: '', title: '', exp: '', dept: '' }, members: [] },
                  track: [], insurance: '', emergency: '', extras: [],
                }
              };
            }
            const a = agencyMap[agencyName];
            const d = a.detail;
            switch (field) {
              case 'sub': a.sub = value; break;
              case 'desc': a.desc = value; break;
              case 'color': a.color = value; break;
              case 'company': d.company = value; break;
              case 'ceo': d.ceo = value; break;
              case 'founded': d.founded = value; break;
              case 'listed': d.listed = value; break;
              case 'revenue': d.revenue = value; break;
              case 'assets': d.assets = value; break;
              case 'business': d.business = value; break;
              case 'strengths': d.strengths = value.split('|').map(s => s.trim()); break;
              case 'concept': d.concept = value; break;
              case 'team_structure': d.team.structure = value.split('|').map(s => s.trim()); break;
              case 'pm_name': d.team.pm.name = value; break;
              case 'pm_title': d.team.pm.title = value; break;
              case 'pm_exp': d.team.pm.exp = value; break;
              case 'pm_dept': d.team.pm.dept = value; break;
              case 'member': {
                const parts = value.split('|').map(s => s.trim());
                d.team.members.push({ name: parts[0]||'', title: parts[1]||'', exp: parts[2]||'', role: parts[3]||'' });
                break;
              }
              case 'track': {
                const parts = value.split('|').map(s => s.trim());
                d.track.push({ client: parts[0]||'', pax: parts[1]||'', dest: parts[2]||'', year: parts[3]||'', amount: parts[4]||'-' });
                break;
              }
              case 'insurance': d.insurance = value; break;
              case 'emergency': d.emergency = value; break;
              case 'extras': d.extras = value.split('|').map(s => s.trim()); break;
            }
          });
          const newCards = Object.values(agencyMap);
          if (newCards.length > 0) setAgencyCards(newCards);
        }

        // ── 호텔 상세 ──
        // 시트 구조: 지역 | 업체 | 호텔명 | 별점 | 상세 | 부대시설(|구분) | 가격 | 색상
        if (hotelSheet && hotelSheet.length > 1) {
          const newHotel = {};
          // 새 시트 구조: 지역|업체|안|호텔명|별점|상세|부대시설|가격|합계|색상
          // 구 시트 구조: 지역|업체|호텔명|별점|상세|부대시설|가격|색상
          const headers = hotelSheet[0] || [];
          const hasPlanCol = headers.length >= 3 && (headers[2] || '').trim() === '안';
          if (!hasPlanCol) {
            // 구 형식 시트 → 기본값(개별 호텔 분리) 유지, 시트에서 덮어쓰지 않음
            console.log('호텔 시트 구 형식 감지 → 기본값 사용 (시트 저장하면 새 형식으로 업데이트됩니다)');
          } else {
          hotelSheet.slice(1).forEach(row => {
            const region = (row[0] || '').trim();
            const agency = (row[1] || '').trim();
            const plan = (row[2] || '').trim();
            const name = (row[3] || '').trim();
            const stars = parseInt(row[4]) || 3;
            const details = row[5] || '';
            const amenities = (row[6] || '').split('|').map(s => s.trim()).filter(Boolean);
            const price = row[7] || '';
            const planTotal = row[8] || '';
            const color = row[9] || '#3B82F6';
            if (!region || !agency || !name) return;
            if (!newHotel[region]) newHotel[region] = {};
            if (!newHotel[region][agency]) newHotel[region][agency] = { agency, options: [] };
            const opt = { name, stars, details, amenities, price, color };
            if (plan) opt.plan = plan;
            if (planTotal) opt.planTotal = planTotal;
            newHotel[region][agency].options.push(opt);
          });
          const formatted = {};
          Object.keys(newHotel).forEach(region => {
            formatted[region] = Object.values(newHotel[region]);
          });
          if (Object.keys(formatted).length > 0) setHotelData(formatted);
          } // hasPlanCol else 닫기
        }

        // ── 호텔 이미지 ──
        // 시트 구조: 지역 | 업체 | 호텔명 | 이미지경로1 | 이미지경로2 | ...
        if (hotelImgSheet && hotelImgSheet.length > 1) {
          const newImgs = {};
          hotelImgSheet.slice(1).forEach(row => {
            const region = (row[0] || '').trim();
            const agency = (row[1] || '').trim();
            const hotel = (row[2] || '').trim();
            if (!region || !agency || !hotel) return;
            if (!newImgs[region]) newImgs[region] = {};
            if (!newImgs[region][agency]) newImgs[region][agency] = {};
            newImgs[region][agency][hotel] = row.slice(3).filter(s => s && s.trim());
          });
          if (Object.keys(newImgs).length > 0) {
            Object.assign(HOTEL_IMAGES, newImgs);
          }
        }

        // ── 호텔 위치 ──
        // 시트 구조: 지역 | 업체 | 호텔명 | 지도링크 | 옵션(안)
        if (hotelLocSheet && hotelLocSheet.length > 1) {
          const newLocs = {};
          hotelLocSheet.slice(1).forEach(row => {
            const region = (row[0] || '').trim();
            const agency = (row[1] || '').trim();
            const name = (row[2] || '').trim();
            const mapUrl = (row[3] || '').trim();
            if (!region || !agency || !name || !mapUrl) return;
            const coord = mapsUrlToCoord(mapUrl);
            if (!coord) return;
            if (!newLocs[region]) newLocs[region] = {};
            if (!newLocs[region][agency]) newLocs[region][agency] = [];
            newLocs[region][agency].push({
              name,
              lat: coord.lat,
              lng: coord.lng,
              option: (row[4] || '기본').trim(),
            });
          });
          if (Object.keys(newLocs).length > 0) {
            Object.assign(HOTEL_LOCATIONS, newLocs);
          }
        }

        // ── 일정 데이터 ──
        // 시트 구조: 업체 | Day | 제목 | 일정항목(|구분) | 좌표(이름>지도링크|이름>지도링크)
        function parseItinerary(sheet) {
          if (!sheet || sheet.length <= 1) return null;
          const headers = sheet[0];
          const hasBatch = headers.length > 1 && headers[1] && headers[1].trim() === '차수';
          const result = {};
          sheet.slice(1).forEach(row => {
            const agency = (row[0] || '').trim();
            if (!agency) return;
            if (!result[agency]) result[agency] = { days: [] };
            let batch, dayStr, title, itemsStr, coordsStr;
            if (hasBatch) {
              batch = (row[1] || '').trim();
              dayStr = (row[2] || '').trim();
              title = (row[3] || '').trim();
              itemsStr = row[4] || '';
              coordsStr = (row[5] || '').trim();
            } else {
              batch = '';
              dayStr = (row[1] || '').trim();
              title = (row[2] || '').trim();
              itemsStr = row[3] || '';
              coordsStr = (row[4] || '').trim();
            }
            const items = itemsStr.split('|').map(s => s.trim()).filter(Boolean);
            const coords = coordsStr ? coordsStr.split('|').map(entry => {
              const sep = entry.indexOf('>');
              if (sep === -1) {
                const parts = entry.trim().split(':');
                return { name: parts[0] || '', lat: parseFloat(parts[1]) || 0, lng: parseFloat(parts[2]) || 0 };
              }
              const name = entry.substring(0, sep).trim();
              const url = entry.substring(sep + 1).trim();
              const coord = mapsUrlToCoord(url);
              return coord ? { name, lat: coord.lat, lng: coord.lng } : null;
            }).filter(c => c && c.name) : [];
            result[agency].days.push({
              day: dayStr,
              title,
              items,
              coords,
              batch,
            });
          });
          return Object.keys(result).length > 0 ? result : null;
        }

        const parsedItiBali = parseItinerary(itiBali);
        const parsedItiOki = parseItinerary(itiOki);
        const parsedItiNagoya = parseItinerary(itiNagoya);
        if (parsedItiBali || parsedItiOki || parsedItiNagoya) {
          setItineraryData(prev => ({
            ...prev,
            ...(parsedItiBali ? { '발리': parsedItiBali } : {}),
            ...(parsedItiOki ? { '오키나와': parsedItiOki } : {}),
            ...(parsedItiNagoya ? { '나고야': parsedItiNagoya } : {}),
          }));
        }

        // ── 평가 점수 정의 ──
        if (scoreDefSheet && scoreDefSheet.length > 1) {
          setScoreDefData(scoreDefSheet);
        }

        setSheetLoaded(true);
        console.log('Google Sheets 데이터 로딩 완료');
      } catch(e) {
        console.log('Google Sheets 로딩 실패, 기본값 사용:', e);
      }
    }
    loadFromSheets();
  }, []);

  return (
    <EditContext.Provider value={{ isEditMode }}>
      <div className={`flex min-h-screen ${isEditMode ? 'edit-mode' : ''}`}>
        {/* Edit Toolbar */}
        {isEditMode && (
          <div className="edit-toolbar">
            <div className="flex items-center gap-2">
              <span className="w-2 h-2 bg-white rounded-full animate-pulse"></span>
              <span className="font-bold text-sm">편집 모드</span>
            </div>
            <div className="flex-1"></div>
            <button onClick={handleSaveToSheets} className="bg-green-500 hover:bg-green-600 text-white border border-green-400/50 font-bold">
              {sheetSaveStatus || '📊 시트 저장'}
            </button>
            <button onClick={() => setIsEditMode(false)} className="bg-red-500/80 hover:bg-red-600 text-white border border-red-400/50">편집 종료</button>
          </div>
        )}

        {/* Password Modal */}
        {showPwModal && <PasswordModal onSuccess={handlePwSuccess} onClose={() => setShowPwModal(false)} />}

        {/* Top Navigation */}
        <nav className="fixed top-0 left-0 right-0 z-50 bg-ok-dark text-white shadow-xl">
          <div className="flex items-center h-14 px-6">
            <div className="flex items-center gap-3 mr-8">
              <div className="text-ok-orange font-bold text-lg">OK금융그룹</div>
              <div className="text-xs text-gray-400 hidden lg:block">2026 해외연수 업체 평가</div>
            </div>
            <div className="flex items-center gap-1 flex-1 overflow-x-auto">
              {SECTIONS.map(s => (
                <button key={s.id} onClick={() => scrollTo(s.id)}
                  className={`topnav-link px-3 py-1.5 text-sm rounded-lg flex items-center gap-1.5 whitespace-nowrap transition ${activeSection===s.id ? 'bg-ok-orange text-white' : 'hover:bg-gray-700 text-gray-300'}`}>
                  <span className="text-xs">{s.icon}</span>
                  <span>{s.label}</span>
                </button>
              ))}
              <a href="https://ok-hrd-nagoya.lovable.app/" target="_blank" rel="noopener noreferrer"
                className="topnav-link px-3 py-1.5 text-sm rounded-lg flex items-center gap-1.5 whitespace-nowrap bg-yellow-500 text-gray-900 hover:bg-yellow-400 font-bold ml-1">
                <span className="text-xs">🏅</span>
                <span>Aichi-Nagoya 2026</span>
              </a>
            </div>
            <button onClick={() => exportPDF()}
              className="ml-2 px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 bg-red-600 text-white hover:bg-red-700 transition">
              <span>📄</span>
              <span className="hidden md:inline">PDF</span>
            </button>
            <button onClick={handleLockClick}
              className={`ml-1 px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5 transition ${isEditMode ? 'bg-ok-orange text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>
              <span>{isEditMode ? '🔓' : '🔒'}</span>
              <span className="hidden md:inline">{isEditMode ? '편집 ON' : '잠금'}</span>
            </button>
          </div>
        </nav>

        {/* Main Content */}
        <main className={`flex-1 p-8 max-w-full ${isEditMode ? 'pt-28' : 'pt-20'}`}>
          {/* Header */}
          <div className="mb-8 bg-gradient-to-r from-ok-orange to-ok-mid rounded-xl p-8 text-white shadow-lg relative overflow-hidden">
            <div className="relative z-10">
              <h1 className="text-3xl font-bold">2026년 OK금융그룹 해외연수 프로그램</h1>
              <p className="mt-2 text-white/80 text-lg">운영 업체 선정 입찰 평가 보고서</p>
            </div>
            <div className="absolute right-6 bottom-1 z-20" style={{width:'130px'}}>
              <div className="relative">
                <div className="sparkle" style={{top:'-8px',left:'15px'}}></div>
                <div className="sparkle" style={{top:'3px',right:'8px'}}></div>
                <div className="sparkle" style={{top:'-3px',left:'45px'}}></div>
                <div className="sparkle" style={{top:'10px',right:'30px'}}></div>
                <img src="mascot.png" alt="읏맨" className="mascot-float" style={{width:'110px',height:'auto'}} />
              </div>
            </div>
            <div className="absolute -right-10 -top-10 w-40 h-40 bg-white/5 rounded-full"></div>
            <div className="absolute right-20 -bottom-16 w-52 h-52 bg-white/5 rounded-full"></div>
          </div>

          <OverviewSection overviewData={overviewData} setOverviewData={setOverviewData} agencyCards={agencyCards} setAgencyCards={setAgencyCards} />
          <EvaluationSection internalScores={internalScores} safetySubmission={safetySubmission} scoreDefData={scoreDefData} />
          <QuoteSection quoteData={quoteData} setQuoteData={setQuoteData} />
          <FlightSection flightData={flightData} setFlightData={setFlightData} />
          <HotelSection hotelData={hotelData} setHotelData={setHotelData} />
          <TourSection itineraryData={itineraryData} setItineraryData={setItineraryData} />
          <EtcSection onInternalScoresChange={setInternalScores} internalEvalData={internalEvalData} quoteData={quoteData} safetySubmission={safetySubmission} setSafetySubmission={setSafetySubmission} />
        </main>
      </div>
    </EditContext.Provider>
  );
}

// ============ OVERVIEW ============
function OverviewSection({ overviewData, setOverviewData, agencyCards, setAgencyCards }) {
  const { isEditMode } = useEditMode();
  const [expandedCard, setExpandedCard] = useState(null);

  const updateOverviewField = (idx, val) => {
    setOverviewData(prev => {
      const copy = prev.map(r => [...r]);
      copy[idx][1] = val;
      return copy;
    });
  };

  const updateAgencyCard = (idx, field, val) => {
    setAgencyCards(prev => {
      const copy = prev.map(c => ({...c}));
      copy[idx][field] = val;
      return copy;
    });
  };

  return (
    <section id="overview" className="mb-16 scroll-mt-20">
      <SectionTitle>입찰 개요</SectionTitle>
      <div className="bg-white rounded-xl shadow p-6 mb-6">
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          {overviewData.map(([k,v], idx) => (
            <div key={k} className="flex gap-3 p-3 bg-gray-50 rounded-lg">
              <span className="font-bold text-ok-orange whitespace-nowrap min-w-[80px]">{k}</span>
              <EditableCell value={v} onSave={(val) => updateOverviewField(idx, val)} className="text-sm whitespace-pre-line" multiline={v.includes('\n')} />
            </div>
          ))}
        </div>
      </div>

                      <span className="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{backgroundColor: a.color}}>PM</span>

// ============ EVALUATION ============
function EvaluationSection({ internalScores, safetySubmission, scoreDefData }) {
  const { isEditMode } = useEditMode();
  const [showScoreDef, setShowScoreDef] = useState(false);
  const loadState = () => {
    try {
      const s = localStorage.getItem('ok_eval_state');
      if (s) return JSON.parse(s);
    } catch(e) {}
    return null;
  };
  const defaultWeights = Object.fromEntries(CRITERIA.map(c => [c.id, c.defaultWeight]));
  const defaultScores = {};
  AGENCIES.forEach(a => { CRITERIA.forEach(c => { defaultScores[`${a}_${c.id}`] = 3; }); });

  const saved = loadState();
  const [weights, setWeights] = useState(saved?.weights || defaultWeights);
  const [scores, setScores] = useState(saved?.scores || defaultScores);
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  // 시트 로딩 후 localStorage 변경 감지 → state 갱신
  useEffect(() => {
    const interval = setInterval(() => {
      const current = loadState();
      if (current) {
        const currentStr = JSON.stringify(current.scores);
        const stateStr = JSON.stringify(scores);
        if (currentStr !== stateStr) {
          setWeights(current.weights || defaultWeights);
          setScores(current.scores || defaultScores);
        }
      }
    }, 1000);
    return () => clearInterval(interval);
  }, [scores]);

  useEffect(() => {
    localStorage.setItem('ok_eval_state', JSON.stringify({ weights, scores }));
  }, [weights, scores]);

  const handleWeightChange = (id, val) => {
    const newVal = Math.min(100, Math.max(0, parseInt(val) || 0));
    setWeights(prev => ({ ...prev, [id]: newVal }));
  };

  const totalWeight = Object.values(weights).reduce((a,b) => a+b, 0);

  // 내부평가 점수 자동 반영 (internalScores가 있으면)
  useEffect(() => {
    if (!internalScores) return;
    const hasScores = Object.values(internalScores).some(v => v > 0);
    if (hasScores) {
      setScores(prev => {
        const copy = { ...prev };
        AGENCIES.forEach(a => {
          // 내부평가 평균(0~5) → 반올림해서 1~5 정수로
          const rounded = Math.max(1, Math.min(5, Math.round(internalScores[a] || 0)));
          copy[`${a}_internal`] = rounded;
        });
        return copy;
      });
    }
  }, [internalScores]);

  // 안전사고 매뉴얼 점수 자동 반영 (매뉴얼 7.5 + 병원리스트 2.5 = 10점 만점 → 5점 스케일)
  useEffect(() => {
    if (!safetySubmission) return;
    setScores(prev => {
      const copy = { ...prev };
      AGENCIES.forEach(a => {
        const sub = safetySubmission[a] || {};
        const rawScore = (sub.manual ? 7.5 : 0) + (sub.hospital ? 2.5 : 0); // 0~10
        const scaled = Math.round(rawScore / 10 * 5); // 0~5
        copy[`${a}_safety`] = Math.max(0, Math.min(5, scaled));
      });
      return copy;
    });
  }, [safetySubmission]);

  const computeTotal = (agency) => {
    let sum = 0;
    CRITERIA.forEach(c => {
      sum += (scores[`${agency}_${c.id}`] || 0) * (weights[c.id] || 0) / 100;
    });
    return Math.round(sum * 100) / 100;
  };

  const totals = AGENCIES.map(a => ({ agency:a, total:computeTotal(a) }));
  totals.sort((a,b) => b.total - a.total);
  const ranks = {};
  totals.forEach((t,i) => { ranks[t.agency] = i+1; });
  const winner = totals[0];

  // Chart
  useEffect(() => {
    const canvas = chartRef.current;
    if (!canvas) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const labels = CRITERIA.map(c => c.label);
    const datasets = AGENCIES.map(a => ({
      label: a,
      data: CRITERIA.map(c => scores[`${a}_${c.id}`] || 0),
      borderColor: AGENCY_COLORS[a],
      backgroundColor: AGENCY_COLORS[a] + '33',
      pointBackgroundColor: AGENCY_COLORS[a],
      borderWidth: 2,
      pointRadius: 4,
    }));
    chartInstance.current = new Chart(canvas, {
      type: 'radar',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          r: { min:0, max:5, ticks:{ stepSize:1 }, pointLabels:{ font:{ size:12 } } }
        },
        plugins: { legend: { position:'bottom' } }
      }
    });
  }, [scores]);

  return (
    <section id="evaluation" className="mb-16 scroll-mt-20">
      <div className="flex items-end gap-4 mb-6 pb-2 border-b-2 border-ok-orange">
        <h2 className="text-2xl font-bold text-ok-dark">평가 결과</h2>
        <button onClick={() => setShowScoreDef(true)}
          className="px-4 py-1.5 mb-0.5 bg-white border-2 border-ok-orange text-ok-orange rounded-lg text-sm font-bold hover:bg-ok-orange hover:text-white transition flex items-center gap-1.5">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
          평가 점수별 정의
        </button>
      </div>

      {/* Score Definition Modal */}
      {showScoreDef && (
        <div className="modal-overlay" onClick={() => setShowScoreDef(false)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[85vh] overflow-auto" onClick={e => e.stopPropagation()}>
            {(() => {
              // 시트에서 제목/설명/테이블 데이터 분리
              let modalTitle = '평가 점수별 정의';
              let modalDesc = '';
              let tableData = scoreDefData || [];
              if (tableData.length > 0 && tableData[0][0] === '[제목]') {
                modalTitle = tableData[0][1] || modalTitle;
                tableData = tableData.slice(1);
              }
              if (tableData.length > 0 && tableData[0][0] === '[설명]') {
                modalDesc = tableData[0][1] || '';
                tableData = tableData.slice(1);
              }
              const headers = tableData[0] || [];
              const rows = tableData.slice(1);
              return (
                <React.Fragment>
                  <div className="sticky top-0 bg-gradient-to-r from-ok-orange to-ok-mid text-white px-6 py-4 rounded-t-2xl flex items-center justify-between z-10">
                    <div>
                      <h2 className="text-xl font-bold">{modalTitle}</h2>
                      {modalDesc && <p className="text-sm opacity-80 mt-0.5">{modalDesc}</p>}
                    </div>
                    <button onClick={() => setShowScoreDef(false)} className="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white text-lg font-bold transition">&times;</button>
                  </div>
                  <div className="p-6">
                    {rows.length > 0 ? (
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm border-collapse">
                          <thead>
                            <tr>
                              {headers.map((h, i) => (
                                <th key={i} className={`p-3 text-left text-white font-bold ${i === 0 ? 'w-28 rounded-tl-lg' : i === 1 ? 'w-16 text-center' : ''} ${i === headers.length - 1 ? 'rounded-tr-lg' : ''}`}
                                  style={{ backgroundColor: i <= 1 ? '#F26522' : i === 2 ? '#22C55E' : i === 3 ? '#60A5FA' : i === 4 ? '#FBBF24' : i === 5 ? '#F97316' : '#EF4444' }}>
                                  {h}
                                </th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {rows.map((row, ri) => (
                              <tr key={ri} className={`border-b ${ri % 2 === 0 ? 'bg-gray-50' : 'bg-white'}`}>
                                {row.map((cell, ci) => (
                                  <td key={ci} className={`p-3 ${ci === 0 ? 'font-bold text-ok-dark whitespace-pre-line' : ci === 1 ? 'text-center font-bold text-ok-orange' : 'text-gray-600 text-xs leading-relaxed'}`}>
                                    {ci === 0 ? cell : (cell || '').replace(/[\r\n]+/g, ' ')}
                                  </td>
                                ))}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    ) : (
                      <div className="text-center py-10 text-gray-400">데이터를 불러오는 중...</div>
                    )}
                  </div>
                </React.Fragment>
              );
            })()}
          </div>
        </div>
      )}

      {/* Winner */}
      <div className="bg-gradient-to-r from-ok-orange to-ok-mid text-white rounded-xl p-6 mb-6 flex items-center gap-6 shadow-lg">
        <div className="winner-badge bg-white text-ok-orange w-20 h-20 rounded-full flex items-center justify-center text-3xl font-bold shadow-lg">1</div>
        <div>
          <div className="text-sm opacity-80">현재 종합 1위</div>
          <div className="text-3xl font-bold">{winner.agency}</div>
          <div className="text-lg mt-1">종합점수: {winner.total.toFixed(2)}점</div>
        </div>
      </div>

      {/* Weight warning */}
      {totalWeight !== 100 && (
        <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 mb-4 text-sm">
          가중치 합계가 {totalWeight}%입니다. 100%가 되어야 정확한 평가가 가능합니다.
        </div>
      )}

      <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
        {/* Weight + Score Table */}
        <div className="xl:col-span-2 bg-white rounded-xl shadow p-6">
          <h3 className="font-bold mb-4 text-lg">항목별 가중치 및 점수</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-gray-50">
                  <th className="p-3 text-left">평가항목</th>
                  <th className="p-3 text-center w-40">가중치 (%)</th>
                  {AGENCIES.map(a => <th key={a} className="p-3 text-center" style={{color:AGENCY_COLORS[a]}}>{a}</th>)}
                </tr>
              </thead>
              <tbody>
                {CRITERIA.map(c => (
                  <tr key={c.id} className="border-t">
                    <td className="p-3 font-medium">{c.label}</td>
                    <td className="p-3">
                      <div className="flex items-center gap-2">
                        <input type="range" min="0" max="100" value={weights[c.id]}
                          onChange={e => handleWeightChange(c.id, e.target.value)}
                          disabled={!isEditMode}
                          className="flex-1 accent-ok-orange" />
                        <input type="number" min="0" max="100" value={weights[c.id]}
                          onChange={e => handleWeightChange(c.id, e.target.value)}
                          disabled={!isEditMode}
                          className="w-14 text-center border rounded p-1 text-sm disabled:bg-gray-50" />
                      </div>
                    </td>
                    {AGENCIES.map(a => {
                      const isInternalAuto = c.id === 'internal' && internalScores && Object.values(internalScores).some(v => v > 0);
                      const isSafetyAuto = c.id === 'safety' && safetySubmission;
                      const safetyRaw = isSafetyAuto ? ((safetySubmission[a]?.manual ? 7.5 : 0) + (safetySubmission[a]?.hospital ? 2.5 : 0)) : 0;
                      return (
                      <td key={a} className="p-3 text-center">
                        {isInternalAuto ? (
                          <div className="text-center">
                            <div className="flex justify-center gap-1">
                              {[1,2,3,4,5].map(v => (
                                <span key={v}
                                  className={`w-8 h-8 rounded-full text-xs font-bold flex items-center justify-center ${scores[`${a}_${c.id}`]===v ? 'text-white shadow' : 'bg-gray-100 text-gray-300'}`}
                                  style={scores[`${a}_${c.id}`]===v ? {backgroundColor:AGENCY_COLORS[a]} : {}}>
                                  {v}
                                </span>
                              ))}
                            </div>
                            <div className="text-xs text-ok-orange mt-1">자동 (평균 {(internalScores[a] || 0).toFixed(2)})</div>
                          </div>
                        ) : isSafetyAuto ? (
                          <div className="text-center">
                            <div className="flex justify-center gap-1">
                              {[0,1,2,3,4,5].map(v => (
                                <span key={v}
                                  className={`w-7 h-7 rounded-full text-xs font-bold flex items-center justify-center ${scores[`${a}_${c.id}`]===v ? 'text-white shadow' : 'bg-gray-100 text-gray-300'}`}
                                  style={scores[`${a}_${c.id}`]===v ? {backgroundColor:AGENCY_COLORS[a]} : {}}>
                                  {v}
                                </span>
                              ))}
                            </div>
                            <div className="text-xs text-ok-orange mt-1">자동 ({safetyRaw}/10점)</div>
                          </div>
                        ) : (
                          <div className="flex justify-center gap-1">
                            {[1,2,3,4,5].map(v => (
                              <button key={v}
                                onClick={() => isEditMode && setScores(p => ({...p, [`${a}_${c.id}`]:v}))}
                                disabled={!isEditMode}
                                className={`w-8 h-8 rounded-full text-xs font-bold transition ${scores[`${a}_${c.id}`]===v ? 'text-white shadow' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'} ${!isEditMode ? 'cursor-default' : ''}`}
                                style={scores[`${a}_${c.id}`]===v ? {backgroundColor:AGENCY_COLORS[a]} : {}}>
                                {v}
                              </button>
                            ))}
                          </div>
                        )}
                      </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-ok-orange bg-ok-light font-bold">
                  <td className="p-3">종합점수</td>
                  <td className="p-3 text-center">{totalWeight}%</td>
                  {AGENCIES.map(a => (
                    <td key={a} className="p-3 text-center text-lg" style={{color:AGENCY_COLORS[a]}}>
                      {computeTotal(a).toFixed(2)}
                      <span className="block text-xs text-gray-400">({ranks[a]}위)</span>
                    </td>
                  ))}
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        {/* Radar Chart */}
        <div className="bg-white rounded-xl shadow p-6">
          <h3 className="font-bold mb-4 text-lg">레이더 차트</h3>
          <canvas ref={chartRef} />
          <div className="mt-4">
            <h4 className="font-bold text-sm mb-2">순위</h4>
            {totals.map((t,i) => (
              <div key={t.agency} className="flex items-center gap-3 py-2 border-b last:border-0">
                <span className={`w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold ${i===0?'bg-yellow-500':i===1?'bg-gray-400':'bg-amber-700'}`}>{i+1}</span>
                <span className="font-medium" style={{color:AGENCY_COLORS[t.agency]}}>{t.agency}</span>
                <span className="ml-auto font-bold">{t.total.toFixed(2)}점</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

// ============ QUOTE COMPARISON ============
function QuoteSection({ quoteData, setQuoteData }) {
  const { isEditMode } = useEditMode();
  const [tab, setTab] = useState('발리');
  const data = quoteData[tab];

  const getNumericValue = (v) => {
    if (!v || v==='-') return Infinity;
    const n = parseFloat(v.replace(/[,%원]/g,''));
    return isNaN(n) ? Infinity : n;
  };

  const getRowMin = (row) => {
    const vals = row.slice(1).map(v => getNumericValue(v));
    const min = Math.min(...vals);
    return min === Infinity ? null : min;
  };

  const updateCell = (ri, ci, val) => {
    setQuoteData(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      copy[tab].rows[ri][ci] = val;
      return copy;
    });
  };

  return (
    <section id="quote" className="mb-16 scroll-mt-20">
      <SectionTitle>견적 비교</SectionTitle>
      <TabBar tabs={REGIONS} active={tab} onChange={setTab} />
      <div className="bg-white rounded-xl shadow p-6 overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="bg-ok-dark text-white">

function HotelMap({ region }) {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markersRef = useRef([]);
  const [visibleAgencies, setVisibleAgencies] = useState({ '하나투어': true, '레드캡': true, '롯데관광': true });

  useEffect(() => {
    if (!window.google || !window.google.maps || !mapRef.current) return;
    const center = HOTEL_MAP_CENTERS[region];

    // 지도 초기화 또는 재중심
    if (!mapInstance.current) {
      mapInstance.current = new google.maps.Map(mapRef.current, {
        center: { lat: center.lat, lng: center.lng },
        zoom: center.zoom,
        styles: [{ featureType: 'poi.business', stylers: [{ visibility: 'off' }] }],
      });
    } else {
      mapInstance.current.setCenter({ lat: center.lat, lng: center.lng });
      mapInstance.current.setZoom(center.zoom);
    }

    // 기존 마커 제거
    markersRef.current.forEach(m => m.setMap(null));
    markersRef.current = [];

    const locations = HOTEL_LOCATIONS[region] || {};
    const iconShapes = { '하나투어': '●', '레드캡': '◆', '롯데관광': '■' };

    AGENCIES.forEach(agency => {
      if (!visibleAgencies[agency]) return;
      const hotels = locations[agency] || [];
      const color = AGENCY_COLORS[agency];

      hotels.forEach((h, idx) => {
        const marker = new google.maps.Marker({
          position: { lat: h.lat, lng: h.lng },
          map: mapInstance.current,
          label: { text: String(idx + 1), color: 'white', fontWeight: 'bold', fontSize: '11px' },
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: color,
            fillOpacity: 1,
            strokeColor: '#fff',
            strokeWeight: 2,
            scale: 14,
          },
          title: `${agency} - ${h.name}`,
        });
        const infoWindow = new google.maps.InfoWindow({
          content: `<div style="font-size:13px;font-family:'오케이체',sans-serif;">
            <b style="color:${color}">${agency}</b> [${h.option}]<br/>
            <b>${h.name}</b>
          </div>`
        });
        marker.addListener('click', () => infoWindow.open(mapInstance.current, marker));
        markersRef.current.push(marker);
      });
    });
  }, [region, visibleAgencies]);

  return (
    <div className="bg-white rounded-xl shadow overflow-hidden">
      <div className="p-3 border-b">
        <h3 className="font-bold text-sm flex items-center gap-2 mb-2">
          <span className="w-2 h-5 bg-ok-orange rounded"></span>
          호텔 위치
        </h3>
        <div className="flex gap-1 flex-wrap">
          {AGENCIES.map(a => (
            <button key={a} onClick={() => setVisibleAgencies(p => ({ ...p, [a]: !p[a] }))}
              className={`px-2 py-1 rounded text-xs font-bold border transition ${visibleAgencies[a] ? 'text-white' : 'bg-white'}`}
              style={visibleAgencies[a] ? { backgroundColor: AGENCY_COLORS[a], borderColor: AGENCY_COLORS[a] } : { borderColor: AGENCY_COLORS[a], color: AGENCY_COLORS[a] }}>
              {a}
            </button>
          ))}
        </div>
      </div>
      <div ref={mapRef} style={{ height: '350px' }} />
      <div className="p-3 border-t bg-gray-50 overflow-y-auto" style={{ maxHeight: '300px' }}>
        {AGENCIES.filter(a => visibleAgencies[a]).map(agency => {
          const hotels = (HOTEL_LOCATIONS[region] || {})[agency] || [];
          return (
            <div key={agency} className="mb-2">
              <div className="text-xs font-bold mb-1" style={{ color: AGENCY_COLORS[agency] }}>{agency}</div>
              {hotels.map((h, i) => (
                <div key={i} className="text-xs text-gray-600 py-1 pl-2 border-l-2 mb-1 hover:bg-white rounded-r transition cursor-pointer"
                  style={{ borderLeftColor: AGENCY_COLORS[agency] }}
                  onClick={() => {
                    if (mapInstance.current) {
                      mapInstance.current.panTo({ lat: h.lat, lng: h.lng });
                      mapInstance.current.setZoom(15);
                    }
                  }}>
                  <span className="font-bold">{h.name}</span>
                  <span className="text-gray-400 ml-1">[{h.option}]</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function HotelSection({ hotelData, setHotelData }) {

  const [addingAmenityKey, setAddingAmenityKey] = useState(null);
  const [lightbox, setLightbox] = useState(null);

  const updateHotelField = (groupIdx, optIdx, field, val) => {
    setHotelData(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      copy[tab][groupIdx].options[optIdx][field] = val;
      return copy;
    });
  };

  const updateStars = (groupIdx, optIdx, stars) => {
    setHotelData(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      copy[tab][groupIdx].options[optIdx].stars = stars;
      return copy;
    });
  };

  const removeAmenity = (groupIdx, optIdx, amenityIdx) => {
    setHotelData(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      copy[tab][groupIdx].options[optIdx].amenities.splice(amenityIdx, 1);
      return copy;
    });
  };

  const addAmenity = (groupIdx, optIdx) => {
    if (!newAmenity.trim()) return;
    setHotelData(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      copy[tab][groupIdx].options[optIdx].amenities.push(newAmenity.trim());
      return copy;
    });
    setNewAmenity('');
    setAddingAmenityKey(null);
  };

  return (

          // plan별로 그룹핑

          group.options.forEach((h, oi) => {
            const planName = h.plan || '';

            if (last && last.plan === planName) {
              last.items.push({ h, oi });
              if (h.planTotal) last.planTotal = h.planTotal;
            } else {
              planGroups.push({ plan: planName, items: [{ h, oi }], planTotal: h.planTotal || '' });
            }
          });
          return (
          <div key={group.agency}>
            <h3 className="font-bold text-lg mb-3" style={{color: AGENCY_COLORS[group.agency]}}>{group.agency}</h3>
            <div className="space-y-4">
              {planGroups.map((pg, pgIdx) => (
                <div key={pgIdx}>

                      <span className="text-sm font-bold px-2.5 py-0.5 rounded-full text-white" style={{backgroundColor: AGENCY_COLORS[group.agency]}}>{pg.plan}</span>
                      {pg.planTotal && (
                        <span className="text-sm font-bold text-ok-orange bg-orange-50 px-2.5 py-0.5 rounded-full">
                          합계: <EditableCell value={pg.planTotal} onSave={(val) => {
                            const lastItem = pg.items[pg.items.length - 1];
                            updateHotelField(gi, lastItem.oi, 'planTotal', val);
                          }} className="inline font-bold text-ok-orange" />
                        </span>
                      )}
                    </div>
                  )}
                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    {pg.items.map(({ h, oi }) => (
                      <div key={oi} className="bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden">
                        {(() => {
                          const imgs = getHotelImages(tab, group.agency, h.name);
                          const hasImages = imgs && imgs.length > 0;
                          return (
                            <div className={`h-36 relative ${hasImages ? 'hotel-card-img' : ''}`}
                              style={hasImages ? {} : {backgroundColor: h.color, display:'flex', alignItems:'center', justifyContent:'center'}}
                              onClick={() => hasImages && setLightbox({ images: imgs, name: h.name })}>

                          );

                        <div className="p-4">

                                )}

                            ))}
                            {isEditMode && (
                              addingAmenityKey === `${gi}-${oi}` ? (
                                <span className="inline-flex items-center gap-1">

                              ) : (

}

// Geocoding 함수: 장소명 → 좌표
async function geocodePlace(placeName, regionHint) {
  const hints = { '발리': 'Bali, Indonesia', '오키나와': 'Okinawa, Japan', '나고야': 'Nagoya, Japan' };
  const query = placeName + ', ' + (hints[regionHint] || '');
  const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=AIzaSyBpN7eNpBsA3iTYpvfrzgSSv3tVvcN_JR4`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      const loc = data.results[0].geometry.location;
      return { lat: loc.lat, lng: loc.lng, name: placeName };
    }
  } catch (e) {}
  return null;
}
